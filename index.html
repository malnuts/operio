<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#090b10" />
    <title>Operio | Contextual Clinical Learning</title>
    <meta
      name="description"
      content="Operio is a contextual clinical learning platform for procedures, clinical posts, review, and visual reference."
    />
    <meta name="author" content="Operio" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />

    <meta property="og:title" content="Operio | Contextual Clinical Learning" />
    <meta property="og:description" content="Study procedures, clinical posts, review, and visual reference in one learner flow." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="%BASE_URL%favicon.svg" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="%BASE_URL%favicon.svg" />
    <style>
      html {
        background: #090b10;
        color: #e5ebf1;
      }

      body,
      #root {
        min-height: 100vh;
        margin: 0;
        background: #090b10;
        color: #e5ebf1;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <!-- SPA redirect handler for GitHub Pages (works with public/404.html) -->
    <script>
      (function(){
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
      })();
      (function(){
        var l = window.location;
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
